syntax = "proto3";

package naming;

service NamingService {
  rpc RegisterService(ServiceInfo) returns (RegisterResponse);
  rpc LookupService(ServiceName) returns (ServiceInfo);
}

message ServiceInfo {
  string name = 1;
  string host = 2;
  int32 port = 3;
}

message ServiceName {
  string name = 1;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}